[build]
builder = "NIXPACKS"
# nixpacks.toml controls the actual build phases (Python 3.11 + Node.js 20)
buildCommand = "pip install -r requirements.txt && npm install -g npm && cd frontend && npm ci && npm run build"

[deploy]
startCommand = "uvicorn api.main:app --host 0.0.0.0 --port $PORT"
healthcheckPath = "/api/health"
healthcheckTimeout = 30
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
